name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Rust formatting and lint
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install clang
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Show toolchain
        run: |
          clang --version
          rustc --version
          cargo --version

      - name: Run tests
        run: |
          cargo test --workspace
          ./scripts/verify-rust-testdata.sh
          ./scripts/verify-rust-testdata-run.sh

  process-control-windows:
    name: Process control (Windows)
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run process-control tests
        run: cargo test -p yar-process-control

  concurrency-windows:
    name: Concurrency behavior (Windows GNU)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Windows GNU Rust toolchain
        run: rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal

      - name: Show toolchain
        run: |
          clang --version
          rustc +stable-x86_64-pc-windows-gnu --version
          cargo +stable-x86_64-pc-windows-gnu --version

      - name: Run native concurrency fixtures
        run: ./scripts/verify-windows-concurrency.ps1

  release-dry-run:
    name: Release dry run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - concurrency-windows
      - lint
      - process-control-windows
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

      - name: Verify release runtime bundles
        run: ./scripts/verify-release-bundles.sh
